    }

    // shortcut single line shorcut lik na ki zaroorat nhi hai 

    const multiply = (a, b) => a * b;
    console.log("shortcut square;", multiply(5, 5));

    // shortcut : single parameter (bracket nhi);
    const square = x => x * x;
    console.log("shortcut square:", square(6));


    // no parameter ----
    const greet = () => "namaste farhan!";
    console.log(greet());

    // GLOBAL SCOPE

    let globalVar = "main global hoon";
    console.log("Global: ", globalVar);

    // --- LOCAL SCOPE (SIRF FUNTION KE ANDER)---

      console.log("Inside funtion:", localVar);
      console.log("global funtion: ", globalVar);

    localVar()

        }

      // 4. default parameter
      console.log("==== DEFAULT PARAMETER");

      // WITHOUT DEFAULT
      function greetUser(name) {
        console.log(`namaste ${name}`);
      }
      greetUser("farhan");
      greetUser();


      // with default----
      function greetUserDefault(name = "Guest") {
        console.log(`namaste ${name}`);
      }
      greetUserDefault("farhan");
      greetUserDefault();

      // multiple defaults ---\
      function calculatePrice(price, quantity = 1, tax = 10) {
            let total = price * quantity;
            let taxAmount = total * (tax / 100);
            return total + taxAmount;
        }
        console.log("Default params:", calculatePrice(100));  // 100 * 1 + 10% = 110
        console.log("Default params:", calculatePrice(100, 2, 5));  // 100 * 2 + 5% = 210

        //  5. rest parameter
        console.log("===== REST PARAMETER =====");
        // MULTIPLE ARGUMENT KO Array mai convert ----
        function sumAll(...numbers) {
          let total = 0;
          for (let i = 0; i < numbers.length; i++) {
            total += numbers[i];
          }
          return total;

        }

        console.log("sumAll: ", sumAll(1,2,3));
