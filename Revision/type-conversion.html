    <script>
        // TYPE === CONVERSION====

        // converting one data type to another data type is called type convertion

        // example = 
        let num = "20";
        console.log(num);
        console.log(typeof(num));

        num = Number(num);

        console.log(num);
        console.log(typeof(num));

        // example = number to string conversion
        let age = 20;

        console.log("before = ", age);
        console.log("type of before = ",typeof age);

        age = String(age);
        console.log("after = ", age);
        console.log("type of after = ",typeof age);

        // boolean 

        let value = 20;
        console.log(Boolean(value));

        console.log(Boolean(1));
        console.log(Boolean(0));
        console.log(Boolean(3))

        // part =2 if statement

        let Age = 20;
        if (Age >= 18) {
            console.log("adult");
        }

        // if ==== else 

        let finger= 15;
        if (finger > 18) {
            console.log("adult");
        } else {
            console.log("minor");
        }

        // else if 

        let marks = 56;

        if (marks >= 90) {
            console.log("A grade");
        } else if (marks >= 80) {
            console.log("B grade");
        } else if (marks >= 30) {
            console.log("c grade");
        } else {
            console.log("fail");
        }


        // switch 

        let day = 6

        switch(day) {
            case 1:
                console.log("monday");
                break;
            case 2: 
                console.log("tuesday");
                break;
            case 3:
                console.log("wednesday");
                break;
            case 4:
                console.log("thusday");
                break;
            case 5:
                console.log("friday");
                break;
            case 6:
                console.log("satarday");
                break;
            case 7:
                console.log("invalid");
        }
