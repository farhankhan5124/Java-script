    <script>
        // 1. let 

        let user = 20;
        console.log(user);
        user = 20;
        console.log(user)


        // 2.  const

        const user1 = 20;
        // user1 = 21 error

        console.log(user1);

        // 3. var 

        var user2 = 20;
        console.log(user2);
        user2 = 21;
        console.log(user2);

        // string 
        let name = "farhan";
        console.log(name);
        console.log(typeof(name));

        // ?Number

        let num = 22;
        console.log(num);
        console.log(typeof(num));

        // boolean 
        let boolean = true;
        console.log(boolean);
        console.log(typeof(boolean));

        // undefind

        let undefing;
        console.log(undefing);

        // null 

        let nu = null;
        console.log(nu);

        console.log(typeof("farhan"));
        console.log(typeof(20));
        console.log(typeof(true));
        console.log(typeof(undefined));
        console.log(typeof(null));
