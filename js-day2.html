<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhan - JavaScript Day 2 (Operators)</title>
</head>
<body>

    <h1>Farhan ka JavaScript - Day 2</h1>
    <p id="output">Yahan result dikhega.</p>
    <button id="runBtn">Operators Run Karo!</button>

    <script>
        // arithmetic operators

        let a = 10;
        let b = 3;

        let addition = a + b;
        let subtraction = a - b;
        let multiplication = a * b;
        let division = a / b;
        let modulus = a % b;
        let power = a ** b;

        console.log("===== ARITHMETIC OPERATORS =====");
        console.log(` a = ${a}, b = ${b}`);
        console.log(`addition (a + b ) = ${addition}`);
        console.log(`subtration (a - b ) = ${subtraction}`);
        console.log(`multiplication (a * b) = ${multiplication}`);
        console.log(`division (a / b) = ${division}`);
        console.log(`modulus (a % b ) = ${modulus}`);
        console.log(`power (a ** b)  = ${power}`)


        // assignment opertors 

        let x = 5;
        console.log("-----ASSIGNMENT OPERATORS-----")
        console.log(`x = ${x}`);

        x += 3;
        console.log(` x += 3 = ${x}`);

        x -= 2;
        console.log(` x -= 2 = ${x}`);

        x *= 4;
        console.log(` x *= 4 = ${x}`);

        x /= 6;
        console.log(` x /= 6 = ${x}`);

        x %= 21;
        console.log(` x %= 21 = ${x}`);

        //  comparison operators

        let p = 10;
        let q = 5;
        let r = "10";

        console.log("===== COMPARISION OPERATORS =====")
        console.log(` p = &{p}, q = ${q}, r = "${r}"`);


        console.log(`p > q  => ${p > q}`);
        console.log(`p > q  => ${p < q}`);
        console.log(`p >= q  => ${p >= q}`);
        console.log(`p <= q  => ${p <= q}`);


        console.log(`p == r -> ${p == r}`);
        console.log(`p === r -> ${p === r}`);

        console.log(` p != q -> ${p != q}`);
        console.log(` p !== q -> ${p !== q}`);

        //  LOGICAL OPERATORS 

        let isStudent = true;
        let hasID = true;
        let isTeacher = false;

        console.log("===== LOGICAL OPERATORS =====")
        console.log(` isStudent = ${isStudent}, hasID = ${hasID}, isTeacher = ${isTeacher}`);




        // AND

        console.log(`isStudent && hasId -> ${isStudent && hasID}`);
        console.log(`isStudent && isTeacher -> ${isStudent && isTeacher}`);

        // OR 
        console.log(`isStudent || hasID -> ${isStudent || hasID}`);
        
        // NOT 
        console.log(`!isStudent -> ${!isStudent}`);

        // ternary operator 
        console.log("===== ternary operator =====")
        let age = 18;
        let canVote = (age >= 18) ? "yes can we vote" : "no can't";

        console.log(`Age = ${age} -> ${canVote}`);

        let age2 = 16;
        let canVote2 = (age2 >= 18) ? "yes can vote" : "can't vote";


        console.log(`age = ${age2} -> ${canVote2}`);

        //  INCREMENT / DESCRIMENT
        

        let count = 0;
        console.log(`count = ${count}`);

        count++;
        console.log(`count = ${count}`);
        

        let conut2 = 0;
    
        count--;
        console.log(`count2 = ${conut2}`);

        const showOutput = () => {
            let result = `
                ✅ Operators run ho gaye!<br><br>
                <strong>Arithmetic:</strong><br>
                Addition: ${addition}<br>
                Subtraction: ${subtraction}<br>
                Multiplication: ${multiplication}<br>
                Division: ${division}<br>
                Modulus: ${modulus}<br>
                Power: ${power}<br><br>
                <strong>Comparison:</strong><br>
                10 > 5 → ${p > q}<br>
                10 == "10" → ${p == r}<br>
                10 === "10" → ${p === r}<br><br>
                <strong>Ternary:</strong><br>
                Age 18 → ${canVote}<br>
                Age 16 → ${canVote2}
            `;
            document.getElementById("output").innerHTML = result;
        };

        ocument.getElementById("runBtn").addEventListener("click", showOutput);

        console.log("✅ Day 2 complete!");
    </script>
</body>
</html>
